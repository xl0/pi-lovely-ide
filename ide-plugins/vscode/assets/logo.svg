<?xml version="1.0" encoding="UTF-8"?>
<!-- Pi logo (https://pi.dev/logo.svg) with the "i" block replaced by a heart. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Pi Lovely IDE</title>
  <desc id="desc">The Pi mark with a heart in place of the i block</desc>
  <defs>
    <linearGradient id="heart" x1="0.1" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#cc0018"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" rx="150" fill="#09090b"/>

  <g transform="translate(-50 -30)">
    <!-- P shape: outer boundary clockwise, inner hole counter-clockwise -->
    <path fill="#fff" fill-rule="evenodd" d="
      M165.29 165.29
      H517.36
      V400
      H400
      V517.36
      H282.65
      V634.72
      H165.29
      Z
      M282.65 282.65
      V400
      H400
      V282.65
      Z
    "/>
    <g transform="translate(446 400) scale(3.0)">
      <path fill="url(#heart)" d="
        M50 96
        C22 74 4 57 4 36
        C4 19 17 8 31 8
        C40 8 47 13 50 21
        C53 13 60 8 69 8
        C83 8 96 19 96 36
        C96 57 78 74 50 96
        Z
      "/>
      <path fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity=".4"
        d="M20 33 C22 22 32 17 41 20"/>
    </g>
  </g>
</svg>
